<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>Pronunciation Coach</title>
  <style>
    :root{
      --blue:#1a4777;
      --blue2:#123a67;
      --ink:#11375f;
      --bg:#eef1f5;
      --card:#fff;
      --line:#c9d5e3;
      --chip:#eaf0f7;
      --ok:#26b37b;
      --btn:#1e5f95;
      --btn2:#198f88;
      --btn3:#b97723;
      --btn4:#9a3f69;
      --btn5:#64748b;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;height:100%}
    body{
      font-family:"Segoe UI",Arial,sans-serif;
      background:var(--bg);
      color:var(--ink);
      line-height:1.25;
    }

    .hero{
      background:linear-gradient(180deg,var(--blue2),var(--blue));
      color:#fff;
      padding:8px 10px;
    }
    .hero h1{
      margin:0;
      font-size:clamp(1.15rem,4.8vw,1.7rem);
      font-weight:800;
    }
    .hero p{
      margin:2px 0 0;
      font-size:clamp(.85rem,3.3vw,1rem);
      opacity:.95;
    }

    .wrap{
      max-width:1100px;
      margin:6px auto;
      padding:0 6px 8px;
    }

    .panel{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:12px;
      padding:8px;
    }

    .row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
    .row + .row{margin-top:6px}

    .grow{flex:1 1 140px}
    .grow2{flex:2 1 200px}

    label{
      font-size:.86rem;
      font-weight:800;
      display:grid;
      gap:3px;
    }

    select,input[type="number"]{
      min-height:34px;
      border:1.8px solid #9db0c7;
      border-radius:9px;
      padding:4px 8px;
      font-size:.95rem;
      background:#fff;
      color:var(--ink);
      width:100%;
    }

    .btn{
      min-height:34px;
      border:0;
      border-radius:10px;
      padding:6px 10px;
      font-size:.9rem;
      font-weight:800;
      color:#fff;
      cursor:pointer;
      box-shadow:0 2px 0 rgba(0,0,0,.12);
    }
    .btn:disabled{opacity:.55;cursor:not-allowed}
    .b1{background:var(--btn)}
    .b2{background:var(--btn2)}
    .b3{background:var(--btn3)}
    .b4{background:var(--btn4)}
    .b5{background:var(--btn5)}

    .mode{
      border:2px solid #2c5d8f;
      background:#fff;
      color:#1a4f7e;
      border-radius:999px;
      padding:4px 10px;
      min-height:32px;
      font-size:.84rem;
      font-weight:900;
      cursor:pointer;
    }
    .mode.active{background:#1a4f7e;color:#fff}

    .target{
      background:var(--chip);
      border:1px solid #cdd9e8;
      border-radius:10px;
      padding:8px;
      font-size:clamp(1rem,4.3vw,1.15rem);
      font-weight:900;
      color:#0f3864;
    }

    .status{
      font-size:.88rem;
      font-weight:800;
      padding:4px 8px;
      border-radius:999px;
      background:#edf4ff;
      border:1px solid #c9dcf7;
    }

    canvas{
      width:100%;
      height:72px;
      border:1.5px solid #c4d5ea;
      border-radius:8px;
      background:#f8fbff;
      display:block;
    }

    .scoreWrap{
      border:1px solid var(--line);
      border-radius:10px;
      padding:7px;
      background:#fbfdff;
    }
    .big{
      font-size:1.4rem;
      font-weight:900;
      color:#0d3d6e;
      line-height:1;
    }
    .meter{
      height:10px;
      border-radius:999px;
      border:1px solid #b9cae0;
      background:#edf3fb;
      overflow:hidden;
      margin-top:4px;
    }
    .fill{
      height:100%;
      width:0%;
      background:linear-gradient(90deg,#4aa8ff,#26b37b);
    }

    .mini{
      display:grid;
      grid-template-columns:1fr auto;
      gap:6px;
      align-items:center;
      margin-top:5px;
      font-size:.9rem;
      font-weight:800;
    }

    .coach{
      font-size:.93rem;
      background:#fff8e9;
      border:1px solid #f2d7a0;
      border-radius:10px;
      padding:7px;
      margin-top:6px;
      min-height:40px;
    }

    .history{
      max-height:96px;
      overflow:auto;
      border:1px solid #d6e1ee;
      border-radius:9px;
      margin-top:6px;
      background:#fff;
    }
    table{width:100%;border-collapse:collapse}
    th,td{
      text-align:left;
      padding:5px 6px;
      border-bottom:1px solid #edf2f7;
      font-size:.78rem;
    }
    th{position:sticky;top:0;background:#f4f8fd;font-weight:900}

    .hide-phone{display:block}

    /* Phone compression */
    @media (max-width: 700px){
      .hide-phone{display:none !important;}   /* hide model waveform + history on phone */
      .hero p{display:none;}                  /* less vertical space */
      .panel{padding:6px}
      .row{gap:5px}
      .btn{min-height:32px;font-size:.84rem;padding:6px 8px}
      .target{padding:7px}
      canvas{height:62px}
      .scoreWrap{padding:6px}
      .mini{font-size:.84rem}
    }
  </style>
</head>
<body>
  <header class="hero">
    <h1>Pronunciation Coach</h1>
    <p>Listen. Speak. Score.</p>
  </header>

  <main class="wrap">
    <section class="panel">
      <div class="row">
        <label class="grow">Topic
          <select id="setSelect"></select>
        </label>
        <label class="grow2">Sentence
          <select id="phraseSelect"></select>
        </label>
        <button class="btn b5" id="btnRandom">Random</button>
      </div>

      <div class="row">
        <div class="target grow2" id="targetText">Hello, how are you?</div>
        <span class="status" id="status">Ready</span>
      </div>

      <div class="row">
        <button class="btn b1" id="btnModel">Listen</button>
        <button class="btn b2" id="btnRec">Record</button>
        <button class="btn b3" id="btnStop" disabled>Stop</button>
        <button class="btn b4" id="btnReplay" disabled>My voice</button>
      </div>

      <div class="row">
        <label>Speed
          <input id="rate" type="number" min="0.7" max="1.2" step="0.05" value="0.95"/>
        </label>
        <label>Pitch
          <input id="pitch" type="number" min="0.7" max="1.3" step="0.05" value="1.00"/>
        </label>
        <button id="modeVeryEasy" class="mode active">Very Easy</button>
        <button id="modeEasy" class="mode">Easy</button>
        <button id="modeNormal" class="mode">Normal</button>
      </div>

      <div class="row hide-phone">
        <div style="flex:1">
          <div style="font-size:.82rem;font-weight:800;margin-bottom:3px">Model</div>
          <canvas id="modelCanvas" width="800" height="72"></canvas>
        </div>
      </div>

      <div class="row">
        <div style="flex:1">
          <div style="font-size:.82rem;font-weight:800;margin-bottom:3px">Your voice</div>
          <canvas id="userCanvas" width="800" height="72"></canvas>
        </div>
      </div>

      <div class="scoreWrap">
        <div class="big"><span id="overallScore">0</span>/100</div>
        <div class="meter"><div id="overallBar" class="fill"></div></div>

        <div class="mini"><span>Rhythm</span><span id="rhythmScore">0</span></div>
        <div class="meter"><div id="rhythmBar" class="fill"></div></div>

        <div class="mini"><span>Volume</span><span id="volumeScore">0</span></div>
        <div class="meter"><div id="volumeBar" class="fill"></div></div>

        <div class="mini"><span>Time</span><span id="durationScore">0</span></div>
        <div class="meter"><div id="durationBar" class="fill"></div></div>
      </div>

      <div id="feedback" class="coach">Press Record. Speak. Press Stop.</div>

      <div class="history hide-phone">
        <table>
          <thead><tr><th>#</th><th>Sentence</th><th>Score</th><th>Time</th></tr></thead>
          <tbody id="historyBody"></tbody>
        </table>
      </div>

      <div class="row">
        <button class="btn b5" id="btnClear">Clear history</button>
      </div>
    </section>
  </main>

<script>
const PHRASE_SETS = {
  "General": ["Hello, how are you?","Could you help me, please?","Can you say that again?","Thank you for your time.","Please speak slowly.","I understand a little English.","Can I ask a question?","I am learning English now.","That is very helpful.","See you tomorrow."],
  "Health": ["I need to see a doctor today.","I have a headache.","My appointment is at ten thirty.","I feel sick today.","I have a sore throat.","Where is the pharmacy?","I need this medicine.","Can you check my blood pressure?","I am allergic to peanuts.","Please call an ambulance."],
  "Work": ["I can start work next week.","Thank you for the interview.","I have customer service experience.","I worked in retail before.","I am available on weekends.","What time does the shift start?","I will be on time.","Can you show me this task?","I need safety shoes.","Please send me the roster."],
  "Housing": ["I would like to apply for this rental.","The kitchen tap is leaking.","When is the next inspection?","How much is the weekly rent?","Is water included in the rent?","The heater is not working.","Can you fix the door lock?","I need a receipt for rent.","Can I sign the lease today?","Please call me about this repair."],
  "Community": ["Nice to meet you.","I live on this street.","Our community centre is open today.","Can I join this group?","We have a class on Friday.","Please bring your ID card.","Thank you for your help today.","I can volunteer on Saturday.","What time does it start?","See you at the event."],
  "Education": ["My class starts at nine oclock.","I need help with homework.","Can you explain this word?","Please repeat the question.","I will submit my task today.","Where is the computer room?","I have a meeting with the teacher.","Can I borrow this book?","I am absent tomorrow.","This lesson is very useful."],
  "Transport": ["Which bus goes to the station?","I need a train ticket.","What platform is this train?","Does this bus stop at the hospital?","I will tap on with my card.","How long is the trip?","Please tell me when to get off.","The next train is late.","I missed my bus.","Can you show me the route map?"],
  "Shopping and Money": ["How much is this item?","Can I pay by card?","Do you have a cheaper one?","I need a receipt please.","This size is too small.","Can I return this product?","Where is the checkout?","I only have cash today.","Is this on special?","Please give me a bag."],
  "Government Services": ["I need to update my address.","How do I apply online?","I need help with this form.","What documents do I need?","Can I book an appointment?","Where is the service centre?","I lost my card.","Please check my application status.","I need an interpreter.","Thank you for your assistance."],
  "Legal and Safety": ["I need to report an incident.","Please call the police.","Where is the nearest safe place?","I do not feel safe here.","Can you explain this rule?","I need legal advice.","Please read this notice.","Do I need to sign this form?","What are my rights?","I need emergency help now."],
  "Digital Skills": ["I need help with my password.","How do I connect to WiFi?","Please open the email app.","I forgot my login details.","Can you show me this website?","I need to upload a file.","Please click this button.","How do I reset my account?","The screen is frozen.","I can join the video call now."],
  "Family Life": ["I will pick up my child at three.","We have dinner at six.","My son is sick today.","Can you watch the baby?","Please call me after school.","I need to buy groceries.","We visit grandma on Sunday.","The children are doing homework.","I am cooking tonight.","Lets clean the house together."],
  "Australian Culture": ["Welcome to our neighbourhood.","We have a barbecue this weekend.","Please bring a plate to share.","The weather is very hot today.","Lets meet at the local park.","We watch footy on Friday night.","Australia Day is in January.","People say mate in Australia.","Thank you for your hospitality.","Have a great weekend."],
  "Environment": ["Please recycle this bottle.","Turn off the lights please.","Save water when you shower.","Use a reusable shopping bag.","Do not litter in the park.","Plant a tree this month.","The air is cleaner today.","Walk to school if possible.","Please sort your rubbish.","Lets protect our environment."],
  "Financial Literacy": ["I need to make a budget.","How much money did I spend?","I want to save every week.","This bill is due tomorrow.","Can I pay in two parts?","I need to check my bank balance.","Please transfer fifty dollars.","I am saving for rent.","This is my monthly expense.","I will compare prices first."]
};

const TIPS = ["Speak slow and clear.","Open your mouth for long sounds.","Finish the last sound.","Keep your voice steady.","Pause between words."];

const setSelect = document.getElementById('setSelect');
const phraseSelect = document.getElementById('phraseSelect');
const targetText = document.getElementById('targetText');
const statusEl = document.getElementById('status');

const btnRandom = document.getElementById('btnRandom');
const btnModel = document.getElementById('btnModel');
const btnRec = document.getElementById('btnRec');
const btnStop = document.getElementById('btnStop');
const btnReplay = document.getElementById('btnReplay');
const btnClear = document.getElementById('btnClear');

const modeVeryEasy = document.getElementById('modeVeryEasy');
const modeEasy = document.getElementById('modeEasy');
const modeNormal = document.getElementById('modeNormal');

const rateInput = document.getElementById('rate');
const pitchInput = document.getElementById('pitch');

const overallScoreEl = document.getElementById('overallScore');
const rhythmScoreEl = document.getElementById('rhythmScore');
const volumeScoreEl = document.getElementById('volumeScore');
const durationScoreEl = document.getElementById('durationScore');

const overallBar = document.getElementById('overallBar');
const rhythmBar = document.getElementById('rhythmBar');
const volumeBar = document.getElementById('volumeBar');
const durationBar = document.getElementById('durationBar');

const feedback = document.getElementById('feedback');
const historyBody = document.getElementById('historyBody');

const modelCanvas = document.getElementById('modelCanvas');
const userCanvas = document.getElementById('userCanvas');
const mctx = modelCanvas.getContext('2d');
const uctx = userCanvas.getContext('2d');

let mediaRecorder=null, analyser=null, dataArr=null, rafId=null, streamRef=null;
let startMs=0, elapsedMs=0;
let recordedChunks=[], audioURL=null, recordedBlob=null;
let replayAudio = new Audio();
replayAudio.preload = "auto";
replayAudio.playsInline = true;
replayAudio.setAttribute("playsinline","true");

let modelWave=[], lastUserWave=[];
let history=[];
let difficulty="veryEasy";

const clamp=(n,a,b)=>Math.max(a,Math.min(b,n));
function setBar(el,v){ el.style.width = clamp(Math.round(v),0,100) + "%"; }
function nowTime(){ return new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}); }

function setDifficulty(mode){
  difficulty=mode;
  [modeVeryEasy,modeEasy,modeNormal].forEach(b=>b.classList.remove('active'));
  if(mode==="veryEasy") modeVeryEasy.classList.add('active');
  if(mode==="easy") modeEasy.classList.add('active');
  if(mode==="normal") modeNormal.classList.add('active');
}
modeVeryEasy.onclick=()=>setDifficulty("veryEasy");
modeEasy.onclick=()=>setDifficulty("easy");
modeNormal.onclick=()=>setDifficulty("normal");

function fitCanvas(c,h=72){
  if(!c) return;
  c.width=Math.floor(c.clientWidth*devicePixelRatio);
  c.height=Math.floor(h*devicePixelRatio);
}
function fitAll(){
  if(modelCanvas) fitCanvas(modelCanvas,72);
  fitCanvas(userCanvas,72);
  drawModel();
}
addEventListener('resize',fitAll);

function drawWave(ctx, arr, color){
  if(!ctx || !arr || !arr.length) return;
  const w=ctx.canvas.width,h=ctx.canvas.height;
  ctx.clearRect(0,0,w,h);

  ctx.strokeStyle='rgba(120,140,170,.25)';
  for(let x=0;x<w;x+=50){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,h); ctx.stroke(); }
  ctx.strokeStyle='rgba(80,110,150,.45)';
  ctx.beginPath(); ctx.moveTo(0,h/2); ctx.lineTo(w,h/2); ctx.stroke();

  ctx.strokeStyle=color;
  ctx.lineWidth=2;
  ctx.beginPath();
  for(let i=0;i<arr.length;i++){
    const x=(i/(arr.length-1))*w;
    const y=h/2 + arr[i]*h*0.34;
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.stroke();
}
function makeModelWave(text, n=500){
  const t=text.toLowerCase();
  const v=(t.match(/[aeiou]/g)||[]).length;
  const c=(t.match(/[bcdfghjklmnpqrstvwxyz]/g)||[]).length;
  const k=clamp((v+1)/(c+1),.35,1.8);
  const arr=[];
  for(let i=0;i<n;i++){
    const env=Math.sin(Math.PI*(i/n));
    const a=Math.sin(i/(8+k))*0.26;
    const b=Math.sin(i/(17-k*2))*0.21;
    const d=Math.sin(i/31)*0.14;
    arr.push((a+b+d)*env);
  }
  return arr;
}
function drawModel(){ if(modelCanvas) drawWave(mctx, modelWave, '#1f8f88'); }

function rms(a){ let s=0; for(const x of a)s+=x*x; return Math.sqrt(s/(a.length||1)); }
function zeroCross(a){ let z=0; for(let i=1;i<a.length;i++){ if((a[i-1]<=0&&a[i]>0)||(a[i-1]>=0&&a[i]<0))z++; } return z; }

function initSets(){
  Object.keys(PHRASE_SETS).forEach(k=>{
    const o=document.createElement('option'); o.value=k; o.textContent=k; setSelect.appendChild(o);
  });
  setSelect.selectedIndex=0;
  fillPhrases();
}
function fillPhrases(){
  phraseSelect.innerHTML="";
  PHRASE_SETS[setSelect.value].forEach((p,i)=>{
    const o=document.createElement('option'); o.value=i; o.textContent=p; phraseSelect.appendChild(o);
  });
  phraseSelect.selectedIndex=0;
  updateTarget();
}
function updateTarget(){
  targetText.textContent = PHRASE_SETS[setSelect.value][Number(phraseSelect.value)];
  modelWave = makeModelWave(targetText.textContent);
  drawModel();
}

function playModel(){
  const text=targetText.textContent.trim();
  if('speechSynthesis' in window){
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.rate=clamp(Number(rateInput.value)||0.95,0.7,1.2);
    u.pitch=clamp(Number(pitchInput.value)||1.0,0.7,1.3);
    u.lang='en-AU';
    speechSynthesis.speak(u);
    statusEl.textContent='Playing model';
  }else{
    statusEl.textContent='No speech voice';
  }
}

async function startRec(){
  try{
    streamRef = await navigator.mediaDevices.getUserMedia({audio:true});
  }catch(e){ statusEl.textContent='Microphone blocked'; return; }

  recordedChunks=[];
  recordedBlob=null;
  if(audioURL){ URL.revokeObjectURL(audioURL); audioURL=null; }
  replayAudio.pause();
  replayAudio.removeAttribute('src');
  replayAudio.load();

  const ac=new (window.AudioContext||window.webkitAudioContext)();
  const src=ac.createMediaStreamSource(streamRef);
  analyser=ac.createAnalyser();
  analyser.fftSize=1024;
  src.connect(analyser);
  dataArr=new Uint8Array(analyser.fftSize);

  const mime = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus'
             : MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4'
             : '';
  mediaRecorder = mime ? new MediaRecorder(streamRef,{mimeType:mime}) : new MediaRecorder(streamRef);

  mediaRecorder.ondataavailable=e=>{ if(e.data && e.data.size>0) recordedChunks.push(e.data); };
  mediaRecorder.onstop=onStopRec;

  mediaRecorder.start();
  startMs=performance.now();
  btnRec.disabled=true; btnStop.disabled=false; btnReplay.disabled=true;
  statusEl.textContent='Recording...';
  loop();
}
function loop(){
  if(!analyser) return;
  analyser.getByteTimeDomainData(dataArr);
  lastUserWave = Array.from(dataArr).map(v=>(v-128)/128);
  drawWave(uctx, lastUserWave, '#ba7a20');
  rafId=requestAnimationFrame(loop);
}
function stopRec(){
  if(mediaRecorder && mediaRecorder.state!=='inactive') mediaRecorder.stop();
  cancelAnimationFrame(rafId);
  btnStop.disabled=true;
}
function onStopRec(){
  elapsedMs = performance.now()-startMs;
  if(recordedChunks.length){
    const type = recordedChunks[0].type || 'audio/webm';
    recordedBlob = new Blob(recordedChunks,{type});
    audioURL = URL.createObjectURL(recordedBlob);
    replayAudio.src = audioURL;
    replayAudio.load();
    btnReplay.disabled=false;
  }else{
    btnReplay.disabled=true;
  }

  btnRec.disabled=false;
  statusEl.textContent='Done';

  if(streamRef){ streamRef.getTracks().forEach(t=>t.stop()); streamRef=null; }
  grade();
}

/* iOS/Android safe playback */
async function replayRec(){
  try{
    if(!audioURL){
      statusEl.textContent='No recording';
      return;
    }
    replayAudio.currentTime = 0;
    replayAudio.muted = false;
    replayAudio.volume = 1;
    await replayAudio.play();
    statusEl.textContent='Playing your voice';
  }catch(e){
    // Fallback: create fresh audio object
    try{
      const a = new Audio(audioURL);
      a.playsInline = true;
      a.setAttribute("playsinline","true");
      await a.play();
      statusEl.textContent='Playing your voice';
    }catch{
      statusEl.textContent='Tap My voice again';
    }
  }
}

function getProfile(mode){
  if(mode==="normal"){
    return {expW:560, durMul:95, durFloor:30, volTarget:0.10, volMul:700, volFloor:30, rhyMul:1.7, rhyFloor:30, wR:0.36,wV:0.32,wD:0.32};
  }
  if(mode==="easy"){
    return {expW:620, durMul:75, durFloor:38, volTarget:0.10, volMul:550, volFloor:40, rhyMul:1.2, rhyFloor:35, wR:0.34,wV:0.33,wD:0.33};
  }
  return {expW:700, durMul:58, durFloor:45, volTarget:0.10, volMul:430, volFloor:48, rhyMul:0.9, rhyFloor:45, wR:0.33,wV:0.34,wD:0.33};
}

function grade(){
  const p=getProfile(difficulty);
  const words=targetText.textContent.trim().split(/\s+/).length||1;
  const expected=clamp(words*p.expW,1300,7600);

  const durRatio=elapsedMs/expected;
  const duration=clamp(100-Math.abs(1-durRatio)*p.durMul,p.durFloor,100);

  const v=rms(lastUserWave);
  const volume=clamp(100-Math.abs(v-p.volTarget)*p.volMul,p.volFloor,100);

  const zU=zeroCross(lastUserWave);
  const zM=zeroCross(modelWave.slice(0,lastUserWave.length));
  const rhythm=clamp(100-Math.abs(zU-zM)*p.rhyMul,p.rhyFloor,100);

  const overall=Math.round(rhythm*p.wR + volume*p.wV + duration*p.wD);

  overallScoreEl.textContent=overall;
  rhythmScoreEl.textContent=Math.round(rhythm);
  volumeScoreEl.textContent=Math.round(volume);
  durationScoreEl.textContent=Math.round(duration);

  setBar(overallBar,overall); setBar(rhythmBar,rhythm); setBar(volumeBar,volume); setBar(durationBar,duration);

  if(overall>=85) feedback.textContent="Excellent. Very clear speaking.";
  else if(overall>=70) feedback.textContent="Good job. Clear voice and pace.";
  else if(overall>=55) feedback.textContent="Nice try. Slow down a little.";
  else feedback.textContent="Good effort. Try again with clear words.";

  history.unshift({phrase:targetText.textContent,score:overall,time:new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})});
  if(history.length>60) history=history.slice(0,60);
  renderHistory();
}
function renderHistory(){
  historyBody.innerHTML='';
  history.forEach((h,i)=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`<td>${i+1}</td><td>${h.phrase}</td><td>${h.score}</td><td>${h.time}</td>`;
    historyBody.appendChild(tr);
  });
}
function clearHistory(){ history=[]; renderHistory(); }

setSelect.addEventListener('change',fillPhrases);
phraseSelect.addEventListener('change',updateTarget);
btnRandom.addEventListener('click',()=>{
  const keys=Object.keys(PHRASE_SETS);
  setSelect.value=keys[Math.floor(Math.random()*keys.length)];
  fillPhrases();
  const arr=PHRASE_SETS[setSelect.value];
  phraseSelect.value=Math.floor(Math.random()*arr.length);
  updateTarget();
});

btnModel.addEventListener('click',playModel);
btnRec.addEventListener('click',startRec);
btnStop.addEventListener('click',stopRec);
btnReplay.addEventListener('click',replayRec);
btnClear.addEventListener('click',clearHistory);

setDifficulty("veryEasy");
initSets();
fitAll();
renderHistory();
</script>
</body>
</html>
